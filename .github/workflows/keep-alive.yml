name: Keep Supabase Alive

on:
  # Run every 4 days at 08:00 UTC (well within the 7-day inactivity window)
  schedule:
    - cron: '0 8 */4 * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep-alive endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Pinging Supabase keep-alive endpoint..."
          echo "URL: ${SITE_URL}/api/keep-alive"

          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${CRON_SECRET}" "${SITE_URL}/api/keep-alive")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response status: $HTTP_CODE"
          echo "Response body: $BODY"

          # Also check if it's 200 OK (or it might succeed without auth depending on deployment)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Supabase is alive!"
          else
            echo "❌ Ping failed with status $HTTP_CODE"
            # Try without auth as fallback just in case
            echo "Trying without auth..."
            RESPONSE2=$(curl -s -w "\n%{http_code}" "${SITE_URL}/api/keep-alive")
            HTTP_CODE2=$(echo "$RESPONSE2" | tail -n1)
            if [ "$HTTP_CODE2" -eq 200 ]; then
              echo "✅ Supabase is alive (no auth)!"
            else
              echo "❌ Ping without auth also failed."
              exit 1
            fi
          fi
